<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Manuals</title>
<script>
  (function(){
    try {
      var t = localStorage.getItem('manuals-theme');
      if (t === 'light' || t === 'dark') document.documentElement.dataset.theme = t;
    } catch(e) {}
  })();
</script>
<style>
  :root {
    --bg: #fafafa;
    --fg: #1a1a1a;
    --muted: #666;
    --border: #e0e0e0;
    --hover: #f0f0f0;
    --row-open: #f4f4f4;
    --zebra: #f3f3f3;
    --panel: #ffffff;
    --accent: #0066cc;
    --downloaded: #1a7f37;
    --pending: #bf8700;
    --chip-bg: #eef2f7;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #1a1a1a;
      --fg: #e8e8e8;
      --muted: #999;
      --border: #333;
      --hover: #2a2a2a;
      --row-open: #242424;
      --zebra: #1e1e1e;
      --panel: #202020;
      --accent: #58a6ff;
      --downloaded: #3fb950;
      --pending: #d29922;
      --chip-bg: #2a3140;
    }
  }
  :root[data-theme="dark"] {
    --bg: #1a1a1a;
    --fg: #e8e8e8;
    --muted: #999;
    --border: #333;
    --hover: #2a2a2a;
    --row-open: #242424;
    --zebra: #1e1e1e;
    --panel: #202020;
    --accent: #58a6ff;
    --downloaded: #3fb950;
    --pending: #d29922;
    --chip-bg: #2a3140;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    margin: 0;
    padding: 2rem 1.5rem;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.5;
  }
  .container { width: 100%; }
  h1 { margin: 0 0 0.25rem; font-size: 1.75rem; }
  .page-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
  }
  #theme-toggle {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.4rem 0.5rem;
    cursor: pointer;
    color: var(--fg);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    line-height: 0;
  }
  #theme-toggle:hover { background: var(--hover); }
  #theme-toggle:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .theme-icon { display: none; }
  /* Default = light theme: show moon (click → dark). */
  .theme-icon-moon { display: inline-block; }
  /* When OS is dark and no explicit override: show sun. */
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) .theme-icon-moon { display: none; }
    :root:not([data-theme="light"]) .theme-icon-sun { display: inline-block; }
  }
  /* Explicit theme attribute always wins. */
  :root[data-theme="dark"] .theme-icon-moon { display: none; }
  :root[data-theme="dark"] .theme-icon-sun { display: inline-block; }
  :root[data-theme="light"] .theme-icon-sun { display: none; }
  :root[data-theme="light"] .theme-icon-moon { display: inline-block; }
  .stats { color: var(--muted); margin: 0 0 1.5rem; font-size: 0.9rem; }
  #search {
    width: 100%;
    padding: 0.6rem 0.75rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 1rem;
    background: var(--bg);
    color: var(--fg);
    margin-bottom: 1rem;
  }
  #search:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  .count {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 0.75rem;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.88rem;
    table-layout: fixed;
  }
  thead { position: sticky; top: 0; background: var(--bg); z-index: 1; }
  th, td {
    text-align: left;
    padding: 0.5rem 0.65rem;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
    word-break: break-word;
  }
  th {
    cursor: pointer;
    user-select: none;
    font-weight: 600;
    color: var(--muted);
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  th:hover { color: var(--fg); }
  th .arrow { display: inline-block; width: 1em; opacity: 0; }
  th.sorted-asc .arrow, th.sorted-desc .arrow { opacity: 1; }
  th.sorted-asc .arrow::after { content: "↑"; }
  th.sorted-desc .arrow::after { content: "↓"; }
  th.col-toggle { width: 2rem; padding-right: 0; cursor: default; }
  th.col-icon, td.col-icon { display: none; }
  th.col-icon { width: 2.2rem; padding-right: 0.25rem; cursor: default; }
  td.col-icon { padding-right: 0.25rem; }
  th.col-product { width: 28%; }
  th.col-file { width: 24%; }
  th.col-source { width: 22%; }
  th.col-saved { width: 5rem; }
  th.col-status { width: 9rem; }
  .file-icon {
    display: inline-flex;
    align-items: center;
    vertical-align: middle;
    color: var(--accent);
    opacity: 0.85;
  }
  .file-icon:hover { opacity: 1; }
  .file-icon svg { display: block; }
  .file-icon-missing { color: var(--muted); opacity: 0.45; cursor: default; }
  tr.row-main { cursor: pointer; background: var(--bg); }
  tr.row-main.zebra { background: var(--zebra); }
  tr.row-main:hover { background: var(--hover); }
  tr.row-main.open { background: var(--row-open); }
  tr.row-main.open td { border-bottom-color: transparent; }
  .caret {
    display: inline-block;
    width: 0.9rem;
    text-align: center;
    color: var(--muted);
    transition: transform 0.12s ease;
  }
  tr.row-main.open .caret { transform: rotate(90deg); }
  tr.row-detail td { padding: 0; }
  .detail {
    padding: 1rem 1.25rem 1.5rem;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  .detail h3 {
    margin: 0 0 0.4rem;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--muted);
    font-weight: 600;
  }
  .detail section { margin-bottom: 1.25rem; }
  .detail section:last-child { margin-bottom: 0; }
  .summary { font-size: 0.95rem; }
  dl.specs {
    display: grid;
    grid-template-columns: minmax(8rem, auto) 1fr;
    gap: 0.35rem 1rem;
    margin: 0;
    font-size: 0.9rem;
  }
  dl.specs dt {
    color: var(--muted);
    font-weight: 500;
    text-transform: capitalize;
  }
  dl.specs dd { margin: 0; }
  ul.features {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }
  ul.features li {
    background: var(--chip-bg);
    color: var(--fg);
    border-radius: 999px;
    padding: 0.2rem 0.7rem;
    font-size: 0.82rem;
  }
  details.tshoot {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.5rem 0.75rem;
    margin-bottom: 0.4rem;
    background: var(--bg);
  }
  details.tshoot[open] { background: var(--hover); }
  details.tshoot summary {
    cursor: pointer;
    font-weight: 500;
    font-size: 0.92rem;
    list-style: none;
  }
  details.tshoot summary::marker, details.tshoot summary::-webkit-details-marker { display: none; }
  details.tshoot summary::before {
    content: "▸";
    display: inline-block;
    width: 1em;
    color: var(--muted);
    transition: transform 0.12s;
  }
  details.tshoot[open] summary::before { transform: rotate(90deg); }
  details.tshoot .fix {
    margin: 0.5rem 0 0 1.2rem;
    font-size: 0.9rem;
    color: var(--fg);
  }
  details.tshoot .page-ref {
    color: var(--muted);
    font-size: 0.78rem;
    margin-left: 0.4rem;
  }
  .not-enriched {
    color: var(--muted);
    font-style: italic;
    font-size: 0.9rem;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .filename { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.85rem; }
  .status {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 999px;
    font-size: 0.78rem;
    font-weight: 500;
    white-space: nowrap;
  }
  .status.downloaded { background: color-mix(in srgb, var(--downloaded) 15%, transparent); color: var(--downloaded); }
  .status.pending { background: color-mix(in srgb, var(--pending) 15%, transparent); color: var(--pending); }
  .empty {
    padding: 3rem 1rem;
    text-align: center;
    color: var(--muted);
  }
  mark {
    background: color-mix(in srgb, var(--accent) 25%, transparent);
    color: inherit;
    border-radius: 2px;
    padding: 0 2px;
  }
  .detail-file .filename { font-size: 0.88rem; word-break: break-all; }

  /* Tablet + mobile: drop the caret-toggle, File, and Source columns from the
     table; surface File via an inline PDF icon next to Product, and put File
     + Source in the expansion drawer instead. */
  @media (max-width: 1023px) {
    body { padding: 1rem; }
    table {
      margin-left: -1rem;
      margin-right: -1rem;
      width: calc(100% + 2rem);
      table-layout: auto;
      font-size: 0.8rem;
    }
    th, td { padding: 0.4rem 0.6rem; }
    th { font-size: 0.7rem; letter-spacing: 0.03em; }
    th.col-toggle, td.col-toggle,
    th.col-file, td.col-file,
    th.col-source, td.col-source { display: none; }
    th.col-icon, td.col-icon { display: table-cell; }
    th.col-icon, td.col-icon { padding-left: 0.6rem; padding-right: 0.15rem; }
    /* Let Product take the leftover space; shrink Saved + Status to content. */
    th.col-product, td.col-product { width: auto; }
    th.col-saved, td.col-saved,
    th.col-status, td.col-status { width: 1%; white-space: nowrap; }
    .status { font-size: 0.7rem; padding: 0.1rem 0.4rem; }
    .detail { padding: 0.75rem 0.9rem 1rem; }
    .detail h3 { font-size: 0.7rem; }
    .summary { font-size: 0.88rem; }
    dl.specs { grid-template-columns: minmax(6rem, auto) 1fr; font-size: 0.82rem; gap: 0.3rem 0.75rem; }
    ul.features li { font-size: 0.75rem; padding: 0.15rem 0.55rem; }
    details.tshoot summary { font-size: 0.85rem; }
  }
  /* Tiny mobile: drop the icon column too — Product/Saved/Status only. */
  @media (max-width: 399px) {
    th.col-icon, td.col-icon { display: none; }
  }
</style>
</head>
<body>
<div class="container">
  <header class="page-header">
    <h1>Manuals</h1>
    <button id="theme-toggle" type="button" aria-label="Toggle dark mode">
      <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </header>
  <p class="stats" id="stats"></p>
  <input id="search" type="search" placeholder="Filter across product, file, source, summary, specs, troubleshooting, full text&hellip;" autofocus>
  <p class="count" id="count"></p>
  <table>
    <thead>
      <tr>
        <th class="col-toggle"></th>
        <th class="col-icon"></th>
        <th class="col-product" data-key="product">Product <span class="arrow"></span></th>
        <th class="col-file" data-key="filename">File <span class="arrow"></span></th>
        <th class="col-source" data-key="source_name">Source <span class="arrow"></span></th>
        <th class="col-saved" data-key="date_saved">Saved <span class="arrow"></span></th>
        <th class="col-status" data-key="status">Status <span class="arrow"></span></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="empty" class="empty" hidden>No matches.</div>
</div>

<script>
  const DATA = __MANUALS_DATA__;

  let sortKey = "date_saved";
  let sortDir = -1;
  const openRows = new Set();

  const $ = (s) => document.querySelector(s);
  const $$ = (s) => document.querySelectorAll(s);

  const esc = (s) => String(s ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;");

  const formatDate = (iso) => {
    const m = /^(\d{4})-(\d{1,2})-(\d{1,2})$/.exec(iso || "");
    return m ? `${m[1].slice(2)}/${+m[2]}/${+m[3]}` : (iso || "");
  };

  const PDF_SVG = '<svg viewBox="0 0 16 16" width="13" height="13" fill="currentColor" aria-hidden="true"><path d="M4 0a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V5.5L9.5 0H4zm0 1h5v4a.5.5 0 0 0 .5.5H13V14a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1zm1.5 7.5a.5.5 0 0 0 0 1h5a.5.5 0 0 0 0-1h-5zm0 2a.5.5 0 0 0 0 1h5a.5.5 0 0 0 0-1h-5z"/></svg>';

  const isEnriched = (m) =>
    Boolean(m.summary || m.specs || m.key_features || (m.troubleshooting && m.troubleshooting.length));

  function statsLine() {
    const total = DATA.length;
    const dl = DATA.filter((m) => m.status === "downloaded").length;
    const pending = total - dl;
    const enriched = DATA.filter(isEnriched).length;
    const parts = [`${total} manual${total === 1 ? "" : "s"}`, `${dl} downloaded`];
    if (pending) parts.push(`${pending} need${pending === 1 ? "s" : ""} manual download`);
    if (total) parts.push(`${enriched} enriched`);
    return parts.join(" · ");
  }

  function statusBadge(s) {
    if (s === "downloaded") return '<span class="status downloaded">downloaded</span>';
    return '<span class="status pending">manual download</span>';
  }

  // Concatenate all searchable text for a manual once, used by the filter.
  function searchableText(m) {
    const parts = [
      m.product, m.filename, m.source_name, m.source_url,
      m.date_saved, formatDate(m.date_saved), m.status, m.summary, m.full_text,
    ];
    if (m.specs) parts.push(Object.entries(m.specs).map(([k, v]) => `${k} ${v}`).join(" "));
    if (m.key_features) parts.push(m.key_features.join(" "));
    if (m.troubleshooting) {
      parts.push(m.troubleshooting.map((t) => `${t.question} ${t.fix}`).join(" "));
    }
    return parts.filter(Boolean).join(" ").toLowerCase();
  }

  function detailHTML(m) {
    const fileLink = m.status === "downloaded"
      ? `<a href="${esc(m.filename)}" class="filename">${esc(m.filename)}</a>`
      : `<span class="filename">${esc(m.filename)}</span>`;
    const fileSection = `<section class="detail-file"><h3>File</h3>${fileLink}</section>`;
    const sourceSection = (m.source_url || m.source_name)
      ? `<section class="detail-source"><h3>Source</h3>${
          m.source_url
            ? `<a href="${esc(m.source_url)}" target="_blank" rel="noopener">${esc(m.source_name || m.source_url)}</a>`
            : esc(m.source_name)
        }</section>`
      : "";
    if (!isEnriched(m)) {
      return `<div class="detail">${fileSection}${sourceSection}<p class="not-enriched">Not enriched yet. Re-run the archive-manual skill on this entry to populate summary, specs, and troubleshooting.</p></div>`;
    }
    const sections = [fileSection, sourceSection].filter(Boolean);
    if (m.summary) {
      sections.push(`<section><h3>Summary</h3><p class="summary">${esc(m.summary)}</p></section>`);
    }
    if (m.specs) {
      const presentSpecs = Object.entries(m.specs).filter(
        ([_, v]) => v !== null && v !== undefined && String(v).trim() !== ""
      );
      if (presentSpecs.length) {
        const items = presentSpecs
          .map(([k, v]) => `<dt>${esc(k.replace(/_/g, " "))}</dt><dd>${esc(v)}</dd>`)
          .join("");
        sections.push(`<section><h3>Specs</h3><dl class="specs">${items}</dl></section>`);
      }
    }
    if (m.key_features && m.key_features.length) {
      const chips = m.key_features.map((f) => `<li>${esc(f)}</li>`).join("");
      sections.push(`<section><h3>Key Features</h3><ul class="features">${chips}</ul></section>`);
    }
    if (m.troubleshooting && m.troubleshooting.length) {
      const items = m.troubleshooting.map((t) => `
        <details class="tshoot">
          <summary>${esc(t.question)}${t.page ? `<span class="page-ref">p. ${esc(t.page)}</span>` : ""}</summary>
          <p class="fix">${esc(t.fix)}</p>
        </details>
      `).join("");
      sections.push(`<section><h3>Troubleshooting</h3>${items}</section>`);
    }
    return `<div class="detail">${sections.join("")}</div>`;
  }

  function render() {
    const q = $("#search").value.trim().toLowerCase();
    let rows = DATA.filter((m) => !q || searchableText(m).includes(q));

    if (sortKey) {
      rows.sort((a, b) => {
        const av = String(a[sortKey] ?? "").toLowerCase();
        const bv = String(b[sortKey] ?? "").toLowerCase();
        if (av < bv) return -sortDir;
        if (av > bv) return sortDir;
        return 0;
      });
    }

    const tbody = $("#tbody");
    tbody.innerHTML = rows.map((m, i) => {
      const id = m.filename;
      const open = openRows.has(id);
      const zebra = i % 2 === 1 ? " zebra" : "";
      const pdfIcon = m.status === "downloaded"
        ? `<a class="file-icon" href="${esc(m.filename)}" onclick="event.stopPropagation()" aria-label="Open ${esc(m.filename)}" title="${esc(m.filename)}">${PDF_SVG}</a>`
        : `<span class="file-icon file-icon-missing" title="${esc(m.filename)} (not downloaded)" aria-label="Not downloaded">${PDF_SVG}</span>`;
      return `
        <tr class="row-main${zebra}${open ? " open" : ""}" data-id="${esc(id)}">
          <td class="col-toggle"><span class="caret">▸</span></td>
          <td class="col-icon">${pdfIcon}</td>
          <td class="col-product">${esc(m.product)}</td>
          <td class="col-file filename">${
            m.status === "downloaded"
              ? `<a href="${esc(m.filename)}" onclick="event.stopPropagation()">${esc(m.filename)}</a>`
              : esc(m.filename)
          }</td>
          <td class="col-source">${
            m.source_url
              ? `<a href="${esc(m.source_url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(m.source_name || m.source_url)}</a>`
              : esc(m.source_name)
          }</td>
          <td class="col-saved">${esc(formatDate(m.date_saved))}</td>
          <td class="col-status">${statusBadge(m.status)}</td>
        </tr>
        ${open ? `<tr class="row-detail"><td colspan="7">${detailHTML(m)}</td></tr>` : ""}
      `;
    }).join("");

    $("#empty").hidden = rows.length !== 0;
    $("#count").textContent = q
      ? `${rows.length} of ${DATA.length} shown`
      : `${DATA.length} total`;

    $$("th[data-key]").forEach((th) => {
      const key = th.dataset.key;
      th.classList.toggle("sorted-asc", key === sortKey && sortDir === 1);
      th.classList.toggle("sorted-desc", key === sortKey && sortDir === -1);
    });
  }

  $("#stats").textContent = statsLine();
  $("#search").addEventListener("input", render);
  $$("th[data-key]").forEach((th) => {
    th.addEventListener("click", () => {
      const key = th.dataset.key;
      if (key === sortKey) sortDir *= -1;
      else { sortKey = key; sortDir = 1; }
      render();
    });
  });
  $("#tbody").addEventListener("click", (e) => {
    const tr = e.target.closest("tr.row-main");
    if (!tr) return;
    const id = tr.dataset.id;
    if (openRows.has(id)) openRows.delete(id);
    else openRows.add(id);
    render();
  });

  render();

  // Theme toggle. Persists explicit choice in localStorage; falls back to OS preference.
  (function(){
    const root = document.documentElement;
    const btn = document.getElementById('theme-toggle');
    function currentTheme() {
      if (root.dataset.theme === 'light' || root.dataset.theme === 'dark') return root.dataset.theme;
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    function updateLabel() {
      btn.setAttribute('aria-label', currentTheme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
    }
    updateLabel();
    btn.addEventListener('click', () => {
      const next = currentTheme() === 'dark' ? 'light' : 'dark';
      root.dataset.theme = next;
      try { localStorage.setItem('manuals-theme', next); } catch(e) {}
      updateLabel();
    });
  })();
</script>
</body>
</html>
