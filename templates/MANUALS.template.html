<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Manuals</title>
<style>
  :root {
    --bg: #fafafa;
    --fg: #1a1a1a;
    --muted: #666;
    --border: #e0e0e0;
    --hover: #f0f0f0;
    --accent: #0066cc;
    --downloaded: #1a7f37;
    --pending: #bf8700;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --fg: #e8e8e8;
      --muted: #999;
      --border: #333;
      --hover: #2a2a2a;
      --accent: #58a6ff;
      --downloaded: #3fb950;
      --pending: #d29922;
    }
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    margin: 0;
    padding: 2rem 1.5rem;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.5;
  }
  .container { max-width: 1200px; margin: 0 auto; }
  h1 { margin: 0 0 0.25rem; font-size: 1.75rem; }
  .stats { color: var(--muted); margin: 0 0 1.5rem; font-size: 0.9rem; }
  #search {
    width: 100%;
    padding: 0.6rem 0.75rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 1rem;
    background: var(--bg);
    color: var(--fg);
    margin-bottom: 1rem;
  }
  #search:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  .count {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 0.75rem;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.92rem;
  }
  thead { position: sticky; top: 0; background: var(--bg); }
  th, td {
    text-align: left;
    padding: 0.6rem 0.75rem;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  th {
    cursor: pointer;
    user-select: none;
    font-weight: 600;
    color: var(--muted);
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  th:hover { color: var(--fg); }
  th .arrow { display: inline-block; width: 1em; opacity: 0; }
  th.sorted-asc .arrow, th.sorted-desc .arrow { opacity: 1; }
  th.sorted-asc .arrow::after { content: "↑"; }
  th.sorted-desc .arrow::after { content: "↓"; }
  tbody tr:hover { background: var(--hover); }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .filename { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.85rem; }
  .status {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 999px;
    font-size: 0.78rem;
    font-weight: 500;
    white-space: nowrap;
  }
  .status.downloaded { background: color-mix(in srgb, var(--downloaded) 15%, transparent); color: var(--downloaded); }
  .status.pending { background: color-mix(in srgb, var(--pending) 15%, transparent); color: var(--pending); }
  .empty {
    padding: 3rem 1rem;
    text-align: center;
    color: var(--muted);
  }
</style>
</head>
<body>
<div class="container">
  <h1>Manuals</h1>
  <p class="stats" id="stats"></p>
  <input id="search" type="search" placeholder="Filter by product, file, source, status&hellip;" autofocus>
  <p class="count" id="count"></p>
  <table>
    <thead>
      <tr>
        <th data-key="product">Product <span class="arrow"></span></th>
        <th data-key="filename">File <span class="arrow"></span></th>
        <th data-key="source_name">Source <span class="arrow"></span></th>
        <th data-key="date_saved">Saved <span class="arrow"></span></th>
        <th data-key="status">Status <span class="arrow"></span></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="empty" class="empty" hidden>No matches.</div>
</div>

<script>
  const DATA = __MANUALS_DATA__;

  let sortKey = "date_saved";
  let sortDir = -1;

  const $ = (s) => document.querySelector(s);
  const $$ = (s) => document.querySelectorAll(s);

  const esc = (s) => String(s ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;");

  function statsLine() {
    const total = DATA.length;
    const dl = DATA.filter((m) => m.status === "downloaded").length;
    const pending = total - dl;
    const parts = [`${total} manual${total === 1 ? "" : "s"}`, `${dl} downloaded`];
    if (pending) parts.push(`${pending} need${pending === 1 ? "s" : ""} manual download`);
    return parts.join(" · ");
  }

  function statusBadge(s) {
    if (s === "downloaded") return '<span class="status downloaded">downloaded</span>';
    return '<span class="status pending">manual download</span>';
  }

  function render() {
    const q = $("#search").value.trim().toLowerCase();
    let rows = DATA.filter((m) => {
      if (!q) return true;
      return ["product", "filename", "source_name", "source_url", "date_saved", "status"]
        .some((k) => String(m[k] ?? "").toLowerCase().includes(q));
    });

    if (sortKey) {
      rows.sort((a, b) => {
        const av = String(a[sortKey] ?? "").toLowerCase();
        const bv = String(b[sortKey] ?? "").toLowerCase();
        if (av < bv) return -sortDir;
        if (av > bv) return sortDir;
        return 0;
      });
    }

    const tbody = $("#tbody");
    tbody.innerHTML = rows.map((m) => `
      <tr>
        <td>${esc(m.product)}</td>
        <td class="filename">${
          m.status === "downloaded"
            ? `<a href="${esc(m.filename)}">${esc(m.filename)}</a>`
            : esc(m.filename)
        }</td>
        <td>${
          m.source_url
            ? `<a href="${esc(m.source_url)}" target="_blank" rel="noopener">${esc(m.source_name || m.source_url)}</a>`
            : esc(m.source_name)
        }</td>
        <td>${esc(m.date_saved)}</td>
        <td>${statusBadge(m.status)}</td>
      </tr>
    `).join("");

    $("#empty").hidden = rows.length !== 0;
    $("#count").textContent = q
      ? `${rows.length} of ${DATA.length} shown`
      : `${DATA.length} total`;

    $$("th").forEach((th) => {
      const key = th.dataset.key;
      th.classList.toggle("sorted-asc", key === sortKey && sortDir === 1);
      th.classList.toggle("sorted-desc", key === sortKey && sortDir === -1);
    });
  }

  $("#stats").textContent = statsLine();
  $("#search").addEventListener("input", render);
  $$("th").forEach((th) => {
    th.addEventListener("click", () => {
      const key = th.dataset.key;
      if (key === sortKey) sortDir *= -1;
      else { sortKey = key; sortDir = 1; }
      render();
    });
  });

  render();
</script>
</body>
</html>
